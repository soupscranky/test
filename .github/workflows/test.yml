name: Test Runner

on:
  repository_dispatch:
    types: [run-bot]
  workflow_dispatch:
    inputs:
      row_index:
        description: "Specific row index to process (overrides NEXT_ROW)"
        required: false
        type: string

env:
  PYTHONUNBUFFERED: "1"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine row index
        id: row
        env:
          INPUT_ROW: ${{ github.event.inputs.row_index }}
        run: |
          if [ -n "$INPUT_ROW" ]; then
            echo "index=$INPUT_ROW" >> "$GITHUB_OUTPUT"
            echo "Using manual row index: $INPUT_ROW"
          else
            echo "index=${{ vars.NEXT_ROW }}" >> "$GITHUB_OUTPUT"
            echo "Using NEXT_ROW variable: ${{ vars.NEXT_ROW }}"
          fi

      - name: Run test
        env:
          DATA_CSV_B64: ${{ secrets.DATA_CSV_B64 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python test.py --row-index ${{ steps.row.outputs.index }}

      - name: Increment NEXT_ROW
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          CURRENT=${{ steps.row.outputs.index }}
          NEXT=$((CURRENT + 1))
          echo "Updating NEXT_ROW from $CURRENT to $NEXT"

          curl -s -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/actions/variables/NEXT_ROW" \
            -d "{\"value\":\"$NEXT\"}"

          echo "NEXT_ROW updated to $NEXT"
